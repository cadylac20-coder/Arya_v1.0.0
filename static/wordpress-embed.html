<script>
(function() {
    // Create container
    var container = document.createElement('div');
    container.id = 'umkov-chat-container';
    container.style.cssText = `
        position:fixed;
        right:20px;
        bottom:20px;
        width:460px;
        height:700px;
        border:none;
        border-radius:12px;
        z-index:999999;
        box-shadow:0 10px 40px rgba(0,0,0,0.2);
        display:block;
        background:white;
        overflow:hidden;
    `;

    // Create iframe
    var iframe = document.createElement('iframe');
    iframe.src = 'https://arya-v1-0-0.onrender.com/widget';
    iframe.id = 'umkov-chat-iframe';
    iframe.style.cssText = `
        width:100%;
        height:100%;
        border:none;
        border-radius:12px;
        background:transparent;
    `;
    iframe.setAttribute('allow', 'microphone');
    iframe.setAttribute('title', 'UMKOV — Travel Assistant');

    container.appendChild(iframe);

    // Append to body
    function appendWidget() {
        document.body.appendChild(container);
    }
    if (document.body) appendWidget();
    else document.addEventListener('DOMContentLoaded', appendWidget);

    // Handle close message from iframe
    window.addEventListener('message', function(event) {
        if (event.data && event.data.action === 'close') {
            console.log('Close message received from widget'); // Debug
            var containerEl = document.getElementById('umkov-chat-container');
            if (containerEl) {
                containerEl.style.display = 'none';
            }
        }
    });

    // Functions to show/hide widget from outside
    window.umkovShowChat = function() {
        var containerEl = document.getElementById('umkov-chat-container');
        if (containerEl) containerEl.style.display = 'block';
    };

    window.umkovHideChat = function() {
        var containerEl = document.getElementById('umkov-chat-container');
        if (containerEl) containerEl.style.display = 'none';
    };
})();
</script>
