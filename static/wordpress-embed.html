<script>
/*
 * Shaina — MKOV Travel Assistant
 * WordPress Footer Embed Script v3.0
 * Paste this ALONE into WPCode footer section.
 * Remove ALL previous embed scripts first.
 */
(function () {

  var RENDER_URL = 'https://arya-v1-0-0.onrender.com/widget';

  /* ── iframe: starts at 0×0 — zero interference with popups ──────── */
  var iframe = document.createElement('iframe');
  iframe.src   = RENDER_URL;
  iframe.id    = 'shaina-iframe';
  iframe.title = 'Shaina — MKOV Travel Assistant';
  iframe.setAttribute('allow', 'microphone');
  iframe.style.cssText = [
    'position:fixed',
    'bottom:0',
    'right:0',
    'width:0',
    'height:0',
    'border:none',
    'z-index:99998',
    'pointer-events:none',
    'background:transparent',
  ].join(';');
  document.body.appendChild(iframe);

  /* ── Launcher button styles ──────────────────────────────────────── */
  var style = document.createElement('style');
  style.textContent = [
    '#shaina-open-btn{',
      'position:fixed;bottom:24px;right:24px;z-index:99999;',
      'display:flex;align-items:center;gap:10px;',
      'background:linear-gradient(135deg,#0d3055,#1a5a8a);',
      'color:#fff;border:none;border-radius:32px;',
      'padding:10px 18px 10px 10px;cursor:pointer;',
      'box-shadow:0 8px 28px rgba(13,48,85,.30);',
      'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;',
      'transition:transform .2s,box-shadow .2s;',
      'user-select:none;',
    '}',
    '#shaina-open-btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(13,48,85,.40);}',
    '.sav{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.3);flex-shrink:0;position:relative;background:#2678b5;}',
    '.sav img{width:100%;height:100%;object-fit:cover;}',
    '.sav-pulse{position:absolute;bottom:0;right:0;width:10px;height:10px;background:#4ade80;border-radius:50%;border:2px solid #fff;animation:sp 2.5s ease-in-out infinite;}',
    '@keyframes sp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}',
    '.slbl{display:flex;flex-direction:column;line-height:1.2;text-align:left;}',
    '.slbl strong{font-size:13.5px;font-weight:500;}',
    '.slbl span{font-size:10.5px;opacity:.72;font-weight:300;}',
    '@media(max-width:520px){',
      '#shaina-open-btn{right:12px;bottom:12px;padding:9px 15px 9px 9px;}',
      '#shaina-open-btn .slbl span{display:none;}',
    '}',
  ].join('');
  document.head.appendChild(style);

  /* ── Launcher button ─────────────────────────────────────────────── */
  var btn = document.createElement('button');
  btn.id = 'shaina-open-btn';
  btn.setAttribute('aria-label', 'Chat with Shaina — MKOV Travel Assistant');
  btn.innerHTML = [
    '<div class="sav">',
      '<img src="https://arya-v1-0-0.onrender.com/static/shaina-avatar.jpg"',
           'onerror="this.style.display=\'none\'"',
           'alt="Shaina">',
      '<div class="sav-pulse"></div>',
    '</div>',
    '<div class="slbl">',
      '<strong>Chat with Shaina</strong>',
      '<span>MKOV Travel Assistant</span>',
    '</div>',
  ].join('');
  document.body.appendChild(btn);

  /* ── Open / close ────────────────────────────────────────────────── */
  var isOpen = false;

  function openChat() {
    isOpen = true;
    var w = window.innerWidth <= 520;
    iframe.style.width         = w ? '100vw'  : '460px';
    iframe.style.height        = w ? '92vh'   : '720px';
    iframe.style.pointerEvents = 'all';
    btn.style.display          = 'none';
    iframe.contentWindow.postMessage({ action: 'open_shaina' }, '*');
  }

  function closeChat() {
    isOpen = false;
    iframe.style.width         = '0';
    iframe.style.height        = '0';
    iframe.style.pointerEvents = 'none';
    btn.style.display          = 'flex';
  }

  btn.addEventListener('click', openChat);

  /* Listen for minimise/close from inside widget.html */
  window.addEventListener('message', function (e) {
    if (e.data && (e.data.action === 'close_shaina' || e.data.action === 'close_umkov')) {
      closeChat();
    }
  });

  /* Responsive resize */
  window.addEventListener('resize', function () {
    if (!isOpen) return;
    var w = window.innerWidth <= 520;
    iframe.style.width  = w ? '100vw' : '460px';
    iframe.style.height = w ? '92vh'  : '720px';
  });

})();
</script>
