<script>
(function() {
  // Create launcher button (always visible)
  var launcher = document.createElement('button');
  launcher.id = 'umkov-launcher';
  launcher.innerHTML = '💬 Chat with UMKOV<br><small>MKOV Travel Assistant</small>';
  launcher.style.cssText = [
    'position:fixed',
    'right:20px',
    'bottom:20px',
    'width:auto',
    'padding:12px 16px',
    'background:linear-gradient(135deg, #0f3c7d 0%, #1a5a96 100%)',
    'color:white',
    'border:none',
    'border-radius:50px',
    'cursor:pointer',
    'z-index:999998',
    'font-size:13px',
    'font-weight:500',
    'text-align:center',
    'box-shadow:0 4px 12px rgba(15, 60, 125, 0.3)',
    'transition:all 0.3s ease',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'gap:8px',
    'line-height:1.3',
  ].join(';');

  // Add hover effect
  launcher.onmouseover = function() {
    this.style.transform = 'scale(1.05)';
    this.style.boxShadow = '0 6px 16px rgba(15, 60, 125, 0.4)';
  };
  launcher.onmouseout = function() {
    this.style.transform = 'scale(1)';
    this.style.boxShadow = '0 4px 12px rgba(15, 60, 125, 0.3)';
  };

  // Create container for iframe (hidden by default)
  var container = document.createElement('div');
  container.id = 'umkov-container';
  container.style.cssText = [
    'position:fixed',
    'right:20px',
    'bottom:90px',
    'width:460px',
    'height:700px',
    'z-index:999999',
    'display:none',
    'border-radius:12px',
    'box-shadow:0 10px 40px rgba(0,0,0,0.2)',
  ].join(';');

  // Create iframe
  var iframe = document.createElement('iframe');
  iframe.src = 'https://arya-v1-0-0.onrender.com/widget';
  iframe.id = 'umkov-iframe';
  iframe.style.cssText = [
    'width:100%',
    'height:100%',
    'border:none',
    'border-radius:12px',
    'background:white',
  ].join(';');
  iframe.setAttribute('allow', 'microphone');
  iframe.setAttribute('title', 'UMKOV Travel Assistant');

  container.appendChild(iframe);

  // Function to show chat
  function showChat() {
    container.style.display = 'block';
    launcher.style.display = 'none';
  }

  // Function to hide chat
  function hideChat() {
    container.style.display = 'none';
    launcher.style.display = 'flex';
  }

  // Launcher button click handler
  launcher.addEventListener('click', function() {
    showChat();
  });

  // Add to page when ready
  function addToPage() {
    if (document.body) {
      document.body.appendChild(launcher);
      document.body.appendChild(container);
    }
  }

  if (document.body) {
    addToPage();
  } else {
    document.addEventListener('DOMContentLoaded', addToPage);
  }

  // Handle close message from iframe
  window.addEventListener('message', function(event) {
    if (event.data && event.data.action === 'close_umkov') {
      hideChat();
    }
  }, false);

  // Expose functions for manual control
  window.umkovShowChat = function() {
    showChat();
  };

  window.umkovHideChat = function() {
    hideChat();
  };

  // Store session in localStorage
  window.umkovSessionId = localStorage.getItem('umkov_session_id') || 'session_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('umkov_session_id', window.umkovSessionId);
})();
</script>
