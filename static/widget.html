<script>
        const API_BASE = 'https://arya-v1-0-0.onrender.com';
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const closeBtn = document.getElementById('closeBtn');

        let sessionId = localStorage.getItem('umkov_session_id') || generateSessionId();
        localStorage.setItem('umkov_session_id', sessionId);

        function generateSessionId() {
            return 'session_' + Math.random().toString(36).substr(2, 9);
        }

        window.addEventListener('load', async () => {
            chatBody.innerHTML = '';
            addAssistantMessage('Welcome to UMKOV! 👋\n\nI\'m your travel assistant. What kind of trip are you dreaming of?');
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        
        // Correctly maps the button click event straight to the parent listener sequence
        closeBtn.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();
            if (window.parent !== window) {
                // Corrected to match the 'close_umkov' keyword explicitly
                window.parent.postMessage({ action: 'close_umkov' }, '*');
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.value = '';
            addUserMessage(message);
            showTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/widget/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (data.reply) {
                    addAssistantMessage(data.reply);
                } else {
                    addAssistantMessage('Sorry, I didn\'t get that. Could you try again?');
                }
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addAssistantMessage('I\'m having trouble connecting. Please try again or call +91-120-XXXXXX. 📞');
            }
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            chatBody.appendChild(div);
            scrollToBottom();
        }

        function addAssistantMessage(text) {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            chatBody.appendChild(div);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            chatBody.appendChild(div);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
