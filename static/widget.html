<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMKOV — Travel Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #6B5BCE 0%, #8B5CF6 100%); /* Matched to image */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Launcher Button */
        #launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #0f3c7d, #1a5a96);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            z-index: 10000;
            transition: all 0.3s ease;
        }
        #launcher:hover { transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }

        .avatar-launch {
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* Widget */
        #widget-container {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 460px;
            height: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        #widget-container.open {
            display: flex;
            transform: scale(1);
        }

        .chat-widget {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Rest of your original styles (header, body, etc.) */
        .chat-header {
            background: linear-gradient(135deg, #0f3c7d 0%, #1a5a96 100%);
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .close-btn {
            background: none; border: none; color: white; font-size: 28px; cursor: pointer;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
        }
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        /* ... (keeping all your message, input, typing styles as they were) */
        .message { margin-bottom: 16px; display: flex; }
        .message.assistant { justify-content: flex-start; }
        .message.user { justify-content: flex-end; }
        .message-bubble {
            max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px;
        }
        .assistant .message-bubble { background: #e8e8e8; color: #333; border-bottom-left-radius: 4px; }
        .user .message-bubble { background: #0f3c7d; color: white; border-bottom-right-radius: 4px; }
        .chat-footer {
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .input-group { display: flex; gap: 8px; flex: 1; }
        input[type="text"] {
            flex: 1; border: 1px solid #ddd; border-radius: 25px; padding: 12px 18px;
            outline: none;
        }
        button {
            background: #0f3c7d; color: white; border: none; border-radius: 50%;
            width: 42px; height: 42px; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Launcher Button -->
    <button id="launcher">
        <div class="avatar-launch">U</div>
        <div>
            <strong>Chat with UMKOV</strong><br>
            <small>Travel Assistant</small>
        </div>
    </button>

    <!-- Widget -->
    <div id="widget-container">
        <div class="chat-widget">
            <div class="chat-header">
                <div class="header-title">
                    <div class="avatar">U</div>
                    <div>
                        <h2>UMKOV</h2>
                        <p>🟢 Online 24/7</p>
                    </div>
                </div>
                <button class="close-btn" id="closeBtn">✕</button>
            </div>

            <div class="chat-body" id="chatBody">
                <div class="loading">Loading conversation...</div>
            </div>

            <div class="chat-footer">
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Ask about destinations, packages, visas...">
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arya-v1-0-0.onrender.com';
        const widgetContainer = document.getElementById('widget-container');
        const launcher = document.getElementById('launcher');
        const closeBtn = document.getElementById('closeBtn');
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let sessionId = localStorage.getItem('umkov_session_id') || 'session_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('umkov_session_id', sessionId);

        // Toggle widget
        function toggleWidget() {
            widgetContainer.classList.toggle('open');
            if (widgetContainer.classList.contains('open')) {
                messageInput.focus();
            }
        }

        launcher.addEventListener('click', toggleWidget);
        closeBtn.addEventListener('click', toggleWidget);

        // Your existing chat logic (sendMessage, addUserMessage, etc.)
        window.addEventListener('load', () => {
            chatBody.innerHTML = '';
            addAssistantMessage('Welcome to UMKOV! 👋\n\nI\'m your travel assistant. What kind of trip are you dreaming of?');
        });

        // ... (Paste all your original functions here: sendMessage, addUserMessage, addAssistantMessage, showTypingIndicator, etc.)

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        // Keep your sendMessage, addUserMessage, etc. functions exactly as before
        // (I didn't repeat all of them here to save space — just copy them from your previous code)
    </script>
</body>
</html>
